# Agentic SDLC Platform — full stack
# Bring up everything with:  docker compose up -d
# See PLAN.md, METADATA.md, PERSONAS.md, LIFECYCLE.md, ARCHITECTURE.md.
#
# Sections:
#   1. Infrastructure
#   2. Model-Driven Core (the 7 engines that interpret metadata)
#   3. Platform services
#   4. AI Workforce (worker pool + workforce api; personas live in metadata DB)
#
# NOTE: implementations land in milestones M0–M7 (see ROADMAP.md). Infra
# services here boot today; app services are stubbed with build contexts.

name: aisdlc

# Reusable fragments (quoted so ${VAR} is YAML-safe; docker interpolates later)
x-restart: &restart { restart: unless-stopped }
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_SERVICE_NAMESPACE: aisdlc
x-meta-db: &meta-db "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-meta:5432/aisdlc_meta?sslmode=disable"
x-data-db: &data-db "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-data:5432/aisdlc_data?sslmode=disable"
x-nats: &nats nats://nats:4222

# ───────────────────────── 1. INFRASTRUCTURE ─────────────────────────
services:

  postgres-meta:                 # the metadata dictionary DB
    <<: *restart
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: aisdlc_meta
    volumes: [ "pgmeta:/var/lib/postgresql/data" ]
    ports: [ "5432:5432" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, timeout: 3s, retries: 20 }

  postgres-data:                 # tenant/business data DB (tables created by ddl-engine)
    <<: *restart
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: aisdlc_data
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    ports: [ "5433:5432" ]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U postgres"], interval: 5s, timeout: 3s, retries: 20 }

  nats:
    <<: *restart
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports: [ "4222:4222", "8222:8222" ]

  redis:
    <<: *restart
    image: redis:7-alpine
    ports: [ "6379:6379" ]

  qdrant:
    <<: *restart
    image: qdrant/qdrant:latest
    ports: [ "6333:6333", "6334:6334" ]
    volumes: [ "qdrant:/qdrant/storage" ]

  vault:
    <<: *restart
    image: hashicorp/vault:1.15
    cap_add: [ "IPC_LOCK" ]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_ROOT_TOKEN:-root}"
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: [ "8200:8200" ]

  registry:
    <<: *restart
    image: registry:2
    ports: [ "5000:5000" ]
    volumes: [ "registry:/var/lib/registry" ]

  mailhog:
    <<: *restart
    image: mailhog/mailhog:latest
    ports: [ "1025:1025", "8025:8025" ]

  # ── Observability ──
  otel-collector:
    <<: *restart
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes: [ "./infra/otel/collector.yaml:/etc/otelcol/config.yaml:ro"]
    depends_on: [ tempo, loki ]

  tempo:
    <<: *restart
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes: ["./infra/otel/tempo.yaml:/etc/tempo.yaml:ro", "tempo:/var/tempo"]

  loki:
    <<: *restart
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes: ["loki:/loki"]

  prometheus:
    <<: *restart
    image: prom/prometheus:latest
    volumes: ["./infra/otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: [ "9090:9090" ]

  grafana:
    <<: *restart
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
    ports: [ "3001:3000" ]
    volumes: ["grafana:/var/lib/grafana"]
    depends_on: [ prometheus, loki, tempo ]

# ───────────────────── 2. MODEL-DRIVEN CORE ─────────────────────
# Generic engines that interpret metadata. No app-specific knowledge.

  metadata-api:
    <<: [*restart, *otel-env]
    build: ./services/core/metadata-api
    environment:
      OTEL_SERVICE_NAME: metadata-api
      META_DB: *meta-db
      NATS_URL: *nats
    depends_on: { postgres-meta: { condition: service_healthy } }

  data-api:
    <<: [*restart, *otel-env]
    build: ./services/core/data-api
    environment:
      OTEL_SERVICE_NAME: data-api
      META_DB: *meta-db
      DATA_DB: *data-db
    depends_on:
      postgres-meta: { condition: service_healthy }
      postgres-data: { condition: service_healthy }

  ddl-engine:
    <<: [*restart, *otel-env]
    build: ./services/core/ddl-engine
    environment:
      OTEL_SERVICE_NAME: ddl-engine
      META_DB: *meta-db
      DATA_DB: *data-db
      NATS_URL: *nats
    depends_on: { postgres-data: { condition: service_healthy } }

  workflow-engine:
    <<: [*restart, *otel-env]
    build: ./services/core/workflow-engine
    environment:
      OTEL_SERVICE_NAME: workflow-engine
      META_DB: *meta-db
      NATS_URL: *nats

  rules-engine:
    <<: [*restart, *otel-env]
    build: ./services/core/rules-engine
    environment:
      OTEL_SERVICE_NAME: rules-engine
      META_DB: *meta-db
      NATS_URL: *nats

  permissions-engine:
    <<: [*restart, *otel-env]
    build: ./services/core/permissions-engine
    environment:
      OTEL_SERVICE_NAME: permissions-engine
      META_DB: *meta-db

  ui-registry:
    <<: [*restart, *otel-env]
    build: ./services/core/ui-registry
    environment:
      OTEL_SERVICE_NAME: ui-registry
      META_DB: *meta-db

# ───────────────────────── 3. PLATFORM SERVICES ─────────────────────────

  gateway:
    <<: [*restart, *otel-env]
    build: ./services/platform/gateway
    environment: { OTEL_SERVICE_NAME: gateway }
    ports: [ "8080:8080" ]
    depends_on: [ identity ]

  identity:
    <<: [*restart, *otel-env]
    build: ./services/platform/identity
    environment:
      OTEL_SERVICE_NAME: identity
      DATABASE_URL: *meta-db
      NATS_URL: *nats
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY:-dev-secret}"
    depends_on: { postgres-meta: { condition: service_healthy } }

  portal:                        # generic UI renderer (reads metadata via ui-registry)
    <<: [*restart, *otel-env]
    build: ./services/platform/portal
    environment:
      OTEL_SERVICE_NAME: portal
      NEXT_PUBLIC_API_URL: http://localhost:8080
      UI_REGISTRY_URL: http://ui-registry:8000
    ports: [ "3000:3000" ]
    depends_on: [ gateway, ui-registry ]

  orchestrator:                  # Temporal-based workboard; routes requests→personas
    <<: [*restart, *otel-env]
    build: ./services/platform/orchestrator
    environment:
      OTEL_SERVICE_NAME: orchestrator
      DATABASE_URL: *meta-db
      NATS_URL: *nats
    depends_on: { postgres-meta: { condition: service_healthy } }

  notifications:
    <<: [*restart, *otel-env]
    build: ./services/platform/notifications
    environment:
      OTEL_SERVICE_NAME: notifications
      DATABASE_URL: *meta-db
      NATS_URL: *nats
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"

  llm-gateway:
    <<: [*restart, *otel-env]
    build: ./services/platform/llm-gateway
    environment:
      OTEL_SERVICE_NAME: llm-gateway
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

  knowledge:
    <<: [*restart, *otel-env]
    build: ./services/platform/knowledge
    environment:
      OTEL_SERVICE_NAME: knowledge
      QDRANT_URL: http://qdrant:6333
      NATS_URL: *nats

  vcs:
    <<: [*restart, *otel-env]
    build: ./services/platform/vcs
    volumes: [ "repos:/repos", "/var/run/docker.sock:/var/run/docker.sock:ro" ]
    environment:
      OTEL_SERVICE_NAME: vcs
      NATS_URL: *nats

  sandbox:
    <<: [*restart, *otel-env]
    build: ./services/platform/sandbox
    volumes: [ "/var/run/docker.sock:/var/run/docker.sock:ro", "sandbox-cache:/cache" ]
    environment:
      OTEL_SERVICE_NAME: sandbox
      REGISTRY: registry:5000

  audit:
    <<: [*restart, *otel-env]
    build: ./services/platform/audit
    environment:
      OTEL_SERVICE_NAME: audit
      DATABASE_URL: *meta-db
      NATS_URL: *nats

# ───────────────────────── 4. AI WORKFORCE ─────────────────────────
# A pool of generic workers. Personas (hats) are metadata in the DB, not
# separate services. Scale agent-runtime replicas to grow headcount.

  workforce-api:                 # manages agents/personas/departments/cost ledger
    <<: [*restart, *otel-env]
    build: ./services/workforce/workforce-api
    environment:
      OTEL_SERVICE_NAME: workforce-api
      DATABASE_URL: *meta-db
      NATS_URL: *nats
    depends_on: { postgres-meta: { condition: service_healthy } }

  agent-runtime:                 # the ReAct worker pool (assign personas per task)
    <<: [*restart, *otel-env]
    build: ./services/workforce/agent-runtime
    deploy: { replicas: 3 }
    environment:
      OTEL_SERVICE_NAME: agent-runtime
      NATS_URL: *nats
      LLM_GATEWAY: http://llm-gateway:8000
      METADATA_API: http://metadata-api:8000
      SANDBOX_URL: http://sandbox:8000
      VCS_URL: http://vcs:8000
      KNOWLEDGE_URL: http://knowledge:8000
      WORKFORCE_API: http://workforce-api:8000
    depends_on: [ llm-gateway, workforce-api ]

volumes:
  pgmeta: {}
  pgdata: {}
  qdrant: {}
  registry: {}
  repos: {}
  sandbox-cache: {}
  tempo: {}
  loki: {}
  grafana: {}
