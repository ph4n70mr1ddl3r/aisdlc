# Grafana Tempo — minimal local-backend config.
# Receives OTLP traces on :4317 (pushed by otel-collector).
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 30s
  max_block_bytes: 1048576
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    block:
      bloom_filter_false_positive: 0.05
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
