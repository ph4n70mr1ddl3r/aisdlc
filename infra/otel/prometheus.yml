# Prometheus — scrapes itself + the collector's metrics endpoint (:8889).
# The collector pushes no metrics; it exposes them for scrape here.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
